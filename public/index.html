<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ticket Inbox · Elemica Ticket Tool</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
<div class="wrap">

  <header>
    <div class="brand">
      <div class="brand-name">Elemica <span class="accent">Ticket Tool</span></div>
      <div class="brand-tag">Workshop Starter · Adva Solutions</div>
    </div>
    <div class="nav-links">
      <a href="/" class="nav-link">Inbox</a>
      <a href="/submit.html" class="nav-link">Submit</a>
      <a href="https://github.com/Yuvalkesh/elemica-ticket-tool" target="_blank" class="nav-link">GitHub</a>
    </div>
  </header>

  <div class="page-head">
    <h1>Ticket Inbox</h1>
    <p class="lead"><span class="num" id="count">—</span> open tickets across the queue. Click any row to triage.</p>
  </div>

  <div class="filters">
    <div class="chip on" data-filter="all">All</div>
    <div class="chip" data-filter="urgent">Urgent</div>
    <div class="chip" data-filter="edi-mapping">EDI Mapping</div>
    <div class="chip" data-filter="xcarrier-change">XCarrier</div>
    <div class="chip" data-filter="sap-request">SAP</div>
    <div class="chip" data-filter="escalation">Escalations</div>
    <div class="chip" data-filter="legacy-deployment">Legacy</div>
    <div class="chip" data-filter="idx-extraction">IDX</div>
    <div class="chip" data-filter="infra-cloud">Cloud</div>
    <input type="text" class="search-input" id="q" placeholder="Search subject or body…">
  </div>

  <div class="ticket-list" id="list"></div>

  <footer>
    <span class="strong">Elemica Ticket Tool</span> · Workshop starter for April 29, 2026 · Built with Claude Code
  </footer>

</div>

<script src="/app.js"></script>
<script>renderInbox();</script>
</body>
</html>
