<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in · Elemica Ticket Tool</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
<div class="wrap">

  <header>
    <div class="brand">
      <div class="brand-name">Elemica <span class="accent">Ticket Tool</span></div>
      <div class="brand-tag">Customer Support · Engineering</div>
    </div>
    <div class="nav-links"></div>
  </header>

  <div class="form-card">
    <h2>Sign in</h2>
    <p class="lead">Enter the team password to continue.</p>

    <div id="err" style="display:none;background:var(--red-soft);border:1px solid var(--red-border);color:var(--red);padding:10px 14px;border-radius:8px;font-size:.86rem;margin-bottom:16px">
      Incorrect password — try again.
    </div>

    <form method="POST" action="/login" autocomplete="off">
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required autofocus>
      </div>
      <button type="submit" class="btn-primary">Sign in →</button>
    </form>
  </div>

  <footer>
    <span class="strong">Elemica Ticket Tool</span>
  </footer>

</div>

<script>
  if (new URLSearchParams(location.search).get("err")) {
    document.getElementById("err").style.display = "block";
  }
</script>
</body>
</html>
